<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WissKomm Formate Quiz</title>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-hover: #4338CA;
      --bg: #F3F4F6;
      --text: #1F2937;
      --card-bg: #FFFFFF;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }
    .container {
      background-color: var(--card-bg);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 600px;
      text-align: center;
    }
    h1 { margin-top: 0; font-size: 1.5rem; }
    h2 { font-size: 1.3rem; margin: 20px 0; color: var(--primary); }
    .custom-sentence { font-size: 1.1rem; font-style: italic; color: #4B5563; margin-bottom: 20px; }
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .btn:hover { background-color: var(--primary-hover); }
    
    /* Teacher Dashboard Styles */
    .result-bar-container {
      display: flex;
      align-items: center;
      margin: 10px 0;
    }
    .result-label { width: 160px; text-align: left; font-weight: bold; font-size: 0.9rem; }
    .result-bar-wrapper {
      flex-grow: 1;
      background-color: #E5E7EB;
      border-radius: 4px;
      height: 24px;
      margin: 0 10px;
      overflow: hidden;
    }
    .result-bar {
      height: 100%;
      background-color: var(--primary);
      width: 0%;
      transition: width 0.5s ease-out;
    }
    .result-count { width: 30px; text-align: right; }
    
    /* Utility */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="student-view" class="container hidden">
    <div id="question-container">
      <h1 id="question-text">Lade Fragen...</h1>
      <button class="btn" id="btn-a" onclick="handleAnswer('A')">Option A</button>
      <button class="btn" id="btn-b" onclick="handleAnswer('B')">Option B</button>
    </div>
    <div id="finished-container" class="hidden">
      <h1>Vielen Dank!</h1>
      <h2>Wie wäre es mit: <span id="student-outcome"></span>?</h2>
      <p id="student-custom-sentence" class="custom-sentence"></p>
      <p>Deine Antwort wurde übermittelt. Schaue auf den Bildschirm der Lehrkraft für die Live-Ergebnisse.</p>
    </div>
  </div>

  <div id="teacher-view" class="container hidden">
    <h1>Live-Ergebnisse des Kurses</h1>
    <p>Gesamte Antworten: <span id="total-count">0</span></p>
    <div id="results-chart"></div>
    <br>
    <button class="btn" onclick="clearResults()" style="background-color: #DC2626;">Alle Daten zurücksetzen</button>
  </div>

  <div id="mode-selector" class="container">
    <h1>Modus auswählen</h1>
    <button class="btn" onclick="startApp('student')">Ich bin ein Student / eine Studentin</button>
    <button class="btn" onclick="startApp('teacher')" style="background-color: #059669;">Ich bin die Lehrkraft</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCfU5OL9OoX-KU_g5Y6vt9EoqIEb9yjNnA",
      authDomain: "wisskomm-formate.firebaseapp.com",
      databaseURL: "https://wisskomm-formate-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "wisskomm-formate",
      storageBucket: "wisskomm-formate.firebasestorage.app",
      messagingSenderId: "104797758706",
      appId: "1:104797758706:web:aec7a1f3a619a7ffa75c6b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app, firebaseConfig.databaseURL);
    
    const activeSessionRef = ref(db, 'active_session_id');
    let currentSessionId = "default_session";
    let unsubscribeResponses = null;

    // Custom sentences can be customized inside the "finalSentence" keys below
    const quizData = {
      "q1": { 
        text: "Möchtest du lieber ein digitales oder ein analoges Präsentationsformat?", 
        a: { text: "Digital", next: "q2_dig" }, 
        b: { text: "Analog", next: "q2_ana" } 
      },
      "q2_dig": { 
        text: "Lieber gesprochene oder geschriebene Sprache?", 
        a: { text: "gesprochen", next: "q3_dig_hor" }, 
        b: { text: "geschrieben", next: "q3_dig_les" } 
      },
      "q2_ana": { 
        text: "Lieber sehen oder hören?", 
        a: { text: "Sehen", next: "q3_ana_seh" }, 
        b: { text: "Hören", next: "q3_ana_hor" } 
      },
      "q3_dig_hor": { 
        text: "Soll es ins Detail gehen oder eher einen Überblick bieten?", 
        a: { text: "Detail", result: "Podcast", finalSentence: "Nimm deine Hörer mit auf eine tiefgründige akustische Reise!" }, 
        b: { text: "Überblick", result: "Erklärvideo", finalSentence: "Bringe komplexe Zusammenhänge in einem dynamischen Video auf den Punkt!" } 
      },
      "q3_dig_les": { 
        text: "Soll es ins Detail gehen oder eher einen Überblick bieten?", 
        a: { text: "Detail", result: "Website", finalSentence: "Gestalte eine interaktive Plattform für umfassendes Wissen!" }, 
        b: { text: "Überblick", result: "Blogbeitrag", finalSentence: "Teile deine Erkenntnisse in einem knackigen, leicht lesbaren Artikel!" } 
      },
      "q3_ana_seh": { 
        text: "Soll es ins Detail gehen oder eher einen Überblick bieten?", 
        a: { text: "Detail", result: "Poster", finalSentence: "Präsentiere deine Daten strukturiert und übersichtlich auf einem Plakat!" }, 
        b: { text: "Überblick", result: "Graphical Recording", finalSentence: "Verwandle Gedanken live in ein kreatives, visuelles Gesamtbild!" } 
      },
      "q3_ana_hor": { 
        text: "Soll es ins Detail gehen oder eher einen Überblick bieten?", 
        a: { text: "Detail", result: "World Café", finalSentence: "Eröffne intensive Diskussionen in gemütlicher Runden-Atmosphäre!" }, 
        b: { text: "Überblick", result: "Pecha Kucha", finalSentence: "Nutze das präzise 20x20-Format für einen rasanten Vortrag!" }
      }
    };

    const possibleOutcomes = ["Podcast", "Erklärvideo", "Website", "Blogbeitrag", "Poster", "Graphical Recording", "World Café", "Pecha Kucha"];
    let currentQuestionKey = "q1";

    // 4. UI LOGIC
    window.startApp = function(mode) {
      document.getElementById('mode-selector').classList.add('hidden');
      
      onValue(activeSessionRef, (snapshot) => {
        const data = snapshot.val();
        if (data && data.id) {
          currentSessionId = data.id;
        } else {
          currentSessionId = "default_session";
        }
        
        if (mode === 'teacher') {
          listenToSessionResponses(currentSessionId);
        }
      });

      if (mode === 'student') {
        document.getElementById('student-view').classList.remove('hidden');
        renderQuestion();
      } else {
        document.getElementById('teacher-view').classList.remove('hidden');
        initTeacherDashboard();
      }
    };

    window.handleAnswer = function(choice) {
      const q = quizData[currentQuestionKey];
      const selected = choice === 'A' ? q.a : q.b;
      
      if (selected.result) {
        const sessionResponsesRef = ref(db, `responses/${currentSessionId}`);
        push(sessionResponsesRef, { result: selected.result });
        
        // Show result and its custom sentence
        document.getElementById('student-outcome').innerText = selected.result;
        document.getElementById('student-custom-sentence').innerText = selected.finalSentence || "";
        
        document.getElementById('question-container').classList.add('hidden');
        document.getElementById('finished-container').classList.remove('hidden');
      } else {
        currentQuestionKey = selected.next;
        renderQuestion();
      }
    };

    function renderQuestion() {
      const q = quizData[currentQuestionKey];
      document.getElementById('question-text').innerText = q.text;
      document.getElementById('btn-a').innerText = q.a.text;
      document.getElementById('btn-b').innerText = q.b.text;
    }

    // 5. TEACHER DASHBOARD LOGIC
    function initTeacherDashboard() {
      const chartDiv = document.getElementById('results-chart');
      chartDiv.innerHTML = ''; 
      
      possibleOutcomes.forEach(outcome => {
        chartDiv.innerHTML += `
          <div class="result-bar-container">
            <div class="result-label">${outcome}</div>
            <div class="result-bar-wrapper">
              <div class="result-bar" id="bar-${outcome.replace(/\s+/g, '-')}"></div>
            </div>
            <div class="result-count" id="count-${outcome.replace(/\s+/g, '-')}">0</div>
          </div>
        `;
      });
    }

    function listenToSessionResponses(sessionId) {
      if (unsubscribeResponses) unsubscribeResponses(); 

      const sessionResponsesRef = ref(db, `responses/${sessionId}`);

      unsubscribeResponses = onValue(sessionResponsesRef, (snapshot) => {
        const data = snapshot.val();
        let counts = {};
        possibleOutcomes.forEach(o => counts[o] = 0);
        let total = 0;

        if (data) {
          Object.values(data).forEach(entry => {
            if (counts[entry.result] !== undefined) {
              counts[entry.result]++;
              total++;
            }
          });
        }

        document.getElementById('total-count').innerText = total;

        possibleOutcomes.forEach(outcome => {
          const safeId = outcome.replace(/\s+/g, '-');
          const count = counts[outcome];
          const percentage = total === 0 ? 0 : (count / total) * 100;
          
          document.getElementById(`count-${safeId}`).innerText = count;
          document.getElementById(`bar-${safeId}`).style.width = `${percentage}%`;
        });
      });
    }

    window.clearResults = function() {
      const password = prompt("Bitte geben Sie das Lehrkraft-Passwort ein, um die Ergebnisse zurückzusetzen:");
      if (!password) return;

      const newSessionId = "session_" + Date.now();
      
      set(activeSessionRef, {
        id: newSessionId,
        adminToken: password
      }).catch(error => {
        alert("Falsches Passwort! Die Live-Ergebnisse konnten nicht zurückgesetzt werden.");
        console.error("Auth Error: ", error);
      });
    };
  </script>
</body>
</html>
